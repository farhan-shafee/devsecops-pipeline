name: Security Pipeline

on:
  pull_request:
  push:
    branches: [main, repo-polish]

permissions:
  contents: read
  security-events: write

jobs:
  sast-semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install semgrep==1.84.0
      - name: Run Semgrep SARIF
        run: semgrep scan --config auto --sarif --output semgrep.sarif src
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install pip-audit==2.7.3
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict --format json --output pip-audit.json
      - uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: false

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t devsecops-lab:ci -f docker/Dockerfile .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: devsecops-lab:ci
          format: sarif
          output: trivy.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          exit-code: '1'
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
