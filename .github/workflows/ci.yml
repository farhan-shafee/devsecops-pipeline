name: CI Validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.4.2

      - name: Syntax check
        run: python -m py_compile src/example_app.py tests/test_example_app.py

      - name: Run tests
        run: pytest -q
