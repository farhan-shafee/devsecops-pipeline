name: CI

on:
  pull_request:
  push:
    branches: [main, clean-devsecops-rebuild]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Compile check
        run: python -m py_compile src/example_app.py

      - name: Run validation script
        run: scripts/validate.sh
